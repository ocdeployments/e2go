<script>
        // Simple micro-interaction for option selection
        const radioGroup = document.getElementById('radio-group');
        const radios = radioGroup.querySelectorAll('input[type="radio"]');
        const containerDivs = radioGroup.querySelectorAll('div.flex');
        const dotDivs = radioGroup.querySelectorAll('.w-3.h-3');

        radios.forEach((radio, index) => {
            radio.addEventListener('change', () => {
                // Reset all
                containerDivs.forEach(div => {
                    div.classList.remove('border-primary-container', 'bg-surface-container-low');
                    div.classList.add('border-outline-variant', 'bg-surface-container-lowest');
                });
                dotDivs.forEach(dot => dot.classList.add('scale-0'));

                // Set active
                if (radio.checked) {
                    containerDivs[index].classList.remove('border-outline-variant', 'bg-surface-container-lowest');
                    containerDivs[index].classList.add('border-primary-container', 'bg-surface-container-low');
                    dotDivs[index].classList.remove('scale-0');
                    dotDivs[index].classList.add('scale-100');
                }
            });
        });

        // Continue button logic simulation
        document.getElementById('btn-continue').addEventListener('click', function() {
            const selected = Array.from(radios).find(r => r.checked);
            if (!selected) {
                alert('Please select an option to continue.');
                return;
            }
            this.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Saving...';
            setTimeout(() => {
                alert('Response saved. Proceeding to Question 4.');
                window.location.reload();
            }, 1000);
        });
    </script>
